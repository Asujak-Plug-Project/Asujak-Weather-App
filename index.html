<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Asujak Weather</title>

<link
href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<link
rel="stylesheet"
href="style.css">

</head>

<body>

<div class="background"></div>

<div class="container">

<div class="card">

<div class="brand">

<h2>☀️ Asujak Weather</h2>

<p>Powered by NTC Tech Concept</p>

</div>

<div class="search">

<input
type="text"
placeholder="Search city...">

<button id="searchBtn">

<img
src="images/search.png"
alt="search">

</button>

</div>

<div class="loader"></div>

<div class="error">

<p>City not found.</p>

</div>

<div class="weather">

<div class="top">

<img
class="weather-icon"
src="images/clear.png">

<div>

<h1 class="temp">28°C</h1>

<h2 class="city">
Port Harcourt
</h2>

<p class="description">
Sunny
</p>

</div>

</div>

<div class="dateTime"></div>

<div class="weather-grid">

<div class="weather-box">

<span>💧</span>

<h3 class="humidity">75%</h3>

<p>Humidity</p>

</div>

<div class="weather-box">

<span>🌬️</span>

<h3 class="wind">14 km/h</h3>

<p>Wind</p>

</div>

<div class="weather-box">

<span>🌡️</span>

<h3 class="feels">30°C</h3>

<p>Feels Like</p>

</div>

<div class="weather-box">

<span>👁️</span>

<h3 class="visibility">8 km</h3>

<p>Visibility</p>

</div>

<div class="weather-box">

<span>📈</span>

<h3 class="pressure">1014</h3>

<p>Pressure</p>

</div>

<div class="weather-box">

<span>🌍</span>

<h3 class="country">NG</h3>

<p>Country</p>

</div>

</div>

</div>

</div>

</div>

<script src="script.js"></script>

</body>

</html>
